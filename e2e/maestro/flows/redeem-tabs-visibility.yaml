appId: dev.casagrown.community
name: "Redemption Tabs Visibility Testing"
---
# Login first (login.yaml handles auth regardless of app state)
- runFlow:
      file: "../utils/login.yaml"

# Wait for feed to load after login
- extendedWaitUntil:
      visible: "Tomatoes|Feed|Create Post"
      timeout: 15000

# Navigate to Redeem via Menu tab (consistent with giftcards/charity/cashout flows)
- tapOn:
      text: ".*Menu.*"

- extendedWaitUntil:
      visible: ".*Redeem Points.*"
      timeout: 5000
- tapOn: ".*Redeem Points.*"

# Wait for Screen to load (title is "Redeem points")
- extendedWaitUntil:
      visible: ".*Redeem points.*|.*Gift Cards.*"
      timeout: 10000

# Validate all default tabs render properly with the healthy DB seeded state
- assertVisible: "Gift Cards"
- assertVisible: "Donate"
- assertVisible: "Cashout"
- assertVisible: "529 Savings"

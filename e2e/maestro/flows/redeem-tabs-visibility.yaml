appId: dev.casagrown.community
name: "Redemption Tabs Visibility Testing"
---
- launchApp:
          clearState: true
          clearKeychain: true

# The flow requires user to be logged in
- runFlow:
          file: "../utils/login.yaml"

# Click Points Badge to reveal menu
- tapOn:
          id: "points-badge"

- assertVisible: "Redeem"
- tapOn: "Redeem"

# Wait for Screen and RPC payload
- extendedWaitUntil:
          visible: "Available Redemptions"
          timeout: 10000

# Validate all default tabs render properly with the healthy DB seeded state
- assertVisible: "Gift Cards"
- assertVisible: "Donate"
- assertVisible: "Cashout"
- assertVisible: "529 Savings"

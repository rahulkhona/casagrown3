# Profile Management Flow — Maestro E2E test
# Tests navigating to profile via Menu tab > Profile & Settings.
# Tab labels on iOS = "Menu, tab, 5 of 5" — use regex.

appId: dev.casagrown.community

---

# Login first
- runFlow: ../utils/login.yaml

# Wait for feed to load
- extendedWaitUntil:
        visible: "Tomatoes"
        timeout: 15000

# Open Menu via bottom tab (regex for iOS accessibility label)
- tapOn:
        text: ".*Menu.*"

# Wait for Profile & Settings in menu
- extendedWaitUntil:
        visible:
              text: ".*Profile.*Settings.*"
        timeout: 5000

# Tap Profile & Settings
- tapOn:
        text: ".*Profile.*Settings.*"

# Verify profile screen loads
- extendedWaitUntil:
        visible:
              text: ".*Profile.*"
        timeout: 10000

# Verify key profile elements
- assertVisible:
        text: ".*Test Seller.*"
- assertVisible:
        text: ".*seller@test.local.*"

# Wallet Refund Flow — Maestro E2E test
# Verifies: User can navigate to the Transaction History / Wallet screen,
# and successfully open the Refund Purchased Points sheet.

appId: dev.casagrown.community

---

# Login first
- runFlow: ../utils/login.yaml

# Wait for feed to load
- extendedWaitUntil:
    visible: "Tomatoes|Feed"
    timeout: 15000

# Open Menu via bottom tab (regex for iOS accessibility label)
- tapOn:
    text: ".*Menu.*"

# Navigate to Transaction History (Wallet)
- extendedWaitUntil:
    visible:
      text: ".*Points Balance.*|.*Transaction History.*"
    timeout: 5000
- tapOn:
    text: ".*Points Balance.*|.*Transaction History.*"

# Verify Wallet Segmented Balance screens loaded
- extendedWaitUntil:
    visible: "Earned Balance.*|Purchased Balance.*"
    timeout: 10000

# Assert the Refund button is visible and tap it
- assertVisible: ".*Refund Purchased Points.*"
- scroll
- tapOn: ".*Refund Purchased Points.*"

# Verify the Refund Sheet opens
- extendedWaitUntil:
    visible: ".*Refund Purchased Points.*"
    timeout: 5000

# It either shows buckets or says "No active purchases available for refund"
- assertVisible: ".*available for refund.*|.*No active purchases.*"

# Feed Navigation Flow — Maestro E2E test
# Tests feed content visibility after login and basic navigation.
# Verifies: seeded posts visible, buy post fields, Menu tab navigation.
#
# Tab labels need regex: ".*Menu.*" etc.
# (React Navigation iOS accessibility label = "Menu, tab, 5 of 5")

appId: dev.casagrown.community

---

# Login first
- runFlow: ../utils/login.yaml

# Wait for feed to load
- extendedWaitUntil:
          visible: "Tomatoes"
          timeout: 15000

# Verify seeded post content
- assertVisible: "Test Seller"
- assertVisible: "Tomatoes"

# Scroll down to find the buy post and verify its new fields
- scroll
- extendedWaitUntil:
          visible:
                  text: ".*Looking for.*"
          timeout: 10000
- assertVisible:
          text: ".*Looking for.*3.*"
- assertVisible:
          text: ".*Need by.*"
- assertVisible:
          text: ".*Drop-off.*"

# Scroll back up
- scrollUntilVisible:
          element: "Tomatoes"
          direction: UP
          timeout: 10000

# Navigate to Menu tab and verify key items are present
- tapOn:
          text: ".*Menu.*"
- extendedWaitUntil:
          visible:
                  text: ".*Profile.*Settings.*"
          timeout: 5000
- assertVisible:
          text: ".*Redeem Points.*"
- assertVisible:
          text: ".*Buy Points.*"

# Scroll down to verify more menu items
- scrollUntilVisible:
          element: "Sign Out"
          direction: DOWN
          timeout: 5000
- assertVisible: "Sign Out"

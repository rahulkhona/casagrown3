# Post Management Flow — Maestro E2E test
# Tests navigating to "My Posts" via the Menu tab.
# Tab labels on iOS = "Menu, tab, 5 of 5" — use regex.

appId: dev.casagrown.community

---

# Login first
- runFlow: ../utils/login.yaml

# Wait for feed to load
- extendedWaitUntil:
          visible: "Tomatoes"
          timeout: 15000

# Open Menu via bottom tab (regex for iOS accessibility label)
- tapOn:
          text: ".*Menu.*"

# Wait for menu to show My Posts option
- extendedWaitUntil:
          visible:
                  text: ".*My Posts.*"
          timeout: 5000

# Tap "My Posts"
- tapOn:
          text: ".*My Posts.*"

# Wait for My Posts screen to load
- extendedWaitUntil:
          visible:
                  text: ".*"
          timeout: 10000

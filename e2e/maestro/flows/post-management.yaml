# Post Management Flow — Maestro E2E test
# Tests navigating to post creation from the Feed screen.
# (Note: "My Posts" has been removed from the Menu;
# post management is now done via the Feed > Create Post button.)

appId: dev.casagrown.community

---

# Login first
- runFlow: ../utils/login.yaml

# Wait for feed to load
- extendedWaitUntil:
          visible: "Create Post"
          timeout: 15000
- scrollUntilVisible:
          element: "Tomatoes"
          direction: DOWN
          timeout: 15000

# Verify the Create Post button is visible on the feed
- scrollUntilVisible:
          element:
                  text: ".*Create Post.*"
          direction: UP
          timeout: 10000

# Tap Create Post to verify navigation works
- tapOn:
          text: ".*Create Post.*"

# Verify we arrive at the post creation screen
- extendedWaitUntil:
          visible:
                  text: ".*What are you posting.*|.*Create Post.*|.*Post.*"
          timeout: 10000

# Go back to feed
- back

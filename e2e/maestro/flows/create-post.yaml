# Create Post Flow — Maestro E2E test
# Tests navigating to the create post form and verifying form fields.

appId: dev.casagrown.community

---

# Login first
- runFlow: ../utils/login.yaml

# Wait for feed to load
- extendedWaitUntil:
          visible: "Create Post"
          timeout: 15000

# Tap create post button
- tapOn: "Create Post"

# Optional: Dismiss the push notification prompt if it appears
- tapOn:
          text: "Not now"
          optional: true

# Should show post type selection
- extendedWaitUntil:
          visible: "What would you like to share with your community?"
          timeout: 10000

# Select "Looking to Sell" (a11y label includes full description)
- tapOn:
          text: ".*Looking to Sell.*"

# Should show the sell form — title is "Sell Produce"
- extendedWaitUntil:
          visible: "Sell Produce"
          timeout: 10000

# Verify form fields (labels include * for required)
- assertVisible:
          text: ".*Category.*"
- assertVisible:
          text: ".*Product.*"

# Regression: Verify neighbor zone selector appears (requires seeded DB with neighbors)
- scrollUntilVisible:
          element:
                  text: ".*Also post to.*|.*adjacent communities.*"
          direction: DOWN
          timeout: 10000
          optional: true

# If neighbor section loaded, verify community pills
- assertVisible:
          text: ".*Rose Garden.*"
          optional: true
- assertVisible:
          text: ".*Cambrian Park.*"
          optional: true

# Go back to type selection
- tapOn: "Back"

# Verify we're back on type selection
- extendedWaitUntil:
          visible: "What would you like to share with your community?"
          timeout: 5000

# ──────────────────────────────────────────────
# Now test the Buy form fields
# ──────────────────────────────────────────────
- tapOn:
          text: ".*Looking to Buy.*"

# Should show the buy form
- extendedWaitUntil:
          visible:
                  text: ".*Looking to Buy.*"
          timeout: 10000

# Verify buy form fields
- assertVisible:
          text: ".*What are you looking for.*"
- scrollUntilVisible:
          element:
                  text: ".*Desired Quantity.*"
          direction: DOWN
          timeout: 10000
- scrollUntilVisible:
          element:
                  text: ".*Unit.*"
          direction: DOWN
          timeout: 10000

# Scroll to see date fields (below the fold on mobile)
- scrollUntilVisible:
          element:
                  text: ".*Drop-[Oo]ff Date.*"
          direction: DOWN
          timeout: 10000

- scrollUntilVisible:
          element:
                  text: ".*Add a date.*"
          direction: DOWN
          timeout: 10000

# Go back to type selection
- tapOn: "Back"

# Go back to feed
- tapOn: "Back"

# Verify we're back on feed (longer timeout — community resolution
# may still be in progress after a fresh login)
- extendedWaitUntil:
          visible: "Create Post"
          timeout: 30000
- scrollUntilVisible:
          element: "Tomatoes"
          direction: DOWN
          timeout: 15000

# Order Flow — Maestro E2E test
# Tests the order button and order sheet visibility.
# Order button only appears on other users' posts.

appId: dev.casagrown.community

---

# Login first
- runFlow: ../utils/login.yaml

# Wait for feed to load
# Wait for feed to load and filter to For Sale (stability)
- extendedWaitUntil:
          visible: "For Sale"
          timeout: 15000
- tapOn: "For Sale"
- extendedWaitUntil:
          visible: "Tomatoes"
          timeout: 15000

# Look for an "Order" button — it only appears on posts from other users.
# The seeded seller account owns the posts, so "Order" may not be visible.
# Use conditional flow to avoid failure.
- runFlow:
          when:
                  visible:
                          id: "order-button"
          commands:
                  - tapOn:
                            id: "order-button"
                  # Wait for order sheet
                  - extendedWaitUntil:
                            visible:
                                    text: ".*Quantity.*"
                            timeout: 10000
                  # Scroll to Cancel button and verify it
                  - scrollUntilVisible:
                            element:
                                    text: "Cancel"
                            direction: DOWN
                            timeout: 10000
                  # Close the order sheet
                  - tapOn: "Cancel"
                  - extendedWaitUntil:
                            visible: "Tomatoes"
                            timeout: 10000

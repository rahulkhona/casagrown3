# Redemption Block Flow — Maestro E2E test
# Verifies: User navigating to Redeem Points only sees "Earned Redeemable Pts"
# instead of linear "Balance", preventing them from dumping purchased points into external giftcards.

appId: dev.casagrown.community

---

# Login first
- runFlow: ../utils/login.yaml

# Wait for feed to load
- extendedWaitUntil:
      visible: "Tomatoes|Feed"
      timeout: 15000

# Open Menu via bottom tab
- tapOn:
      text: ".*Menu.*"

# Navigate to Redeem Points
- extendedWaitUntil:
      visible:
          text: ".*Redeem Points.*"
      timeout: 5000
- tapOn:
      text: ".*Redeem Points.*"

# Wait for Screen and generic tabs
- extendedWaitUntil:
      visible: "Cashout|Donate|Gift Cards"
      timeout: 20000

# Explicitly Assert the Header matches the new Closed-Loop nomenclature
- assertVisible: ".*Earned Redeemable Pts.*"

# Tap Cashout
- tapOn: "Cashout"

# The button should say "Cashout" (the user may not have enough points for confirm)
- scroll
- assertVisible: ".*Cashout.*|.*Need .* Points.*"

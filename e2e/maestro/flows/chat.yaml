# Chat Flow — Maestro E2E test
# Tests navigating to chats via the Chats tab.
# Tab labels on iOS = "Chats, tab, 2 of 5" — use regex.

appId: dev.casagrown.community

---

# Login first
- runFlow: ../utils/login.yaml

# Wait for feed to load
- extendedWaitUntil:
          visible: "Tomatoes"
          timeout: 15000

# Navigate to Chats via bottom tab bar (regex for iOS accessibility label)
- tapOn:
          text: ".*Chats.*"

# Wait for chats screen to load — shows inbox or empty state
- extendedWaitUntil:
          visible:
                  text: ".*"
          timeout: 10000

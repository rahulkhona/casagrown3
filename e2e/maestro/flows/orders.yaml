# Orders Screen — Maestro E2E test (Seller perspective)
# Tests order screen visibility and tab/filter structure.
# Tab labels on iOS = "Orders, tab, 3 of 5" — use regex.
#
# Logged in as Test Seller (seller@test.local)

appId: dev.casagrown.community

---

# Login first
- runFlow: ../utils/login.yaml

# Wait for feed to load
- extendedWaitUntil:
      visible: "Tomatoes"
      timeout: 15000

# Navigate to Orders via bottom tab bar (regex for iOS accessibility label)
- tapOn:
      text: ".*Orders.*"

# Wait for Orders screen to load
- extendedWaitUntil:
      visible: "Open"
      timeout: 10000

# ── Verify tabs and filters are present ──
- assertVisible: "Open"
- assertVisible: "Past"
- assertVisible: "All"
- assertVisible: "Buying"
- assertVisible: "Selling"

# ── Verify at least one order card is visible ──
- assertVisible:
      text: ".*Peppers.*"

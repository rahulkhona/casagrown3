# Cashout Flow — Maestro E2E test
# Verifies: User can navigate to Redeem Points, switch to Cashout tab, and submit a cashout
# Requires: User must be logged in and have at least 1 point

appId: dev.casagrown.community

---

# Login first
- runFlow: ../utils/login.yaml

# Wait for feed to load
- extendedWaitUntil:
          visible: "Tomatoes|Feed"
          timeout: 15000

# Open Menu via bottom tab (regex for iOS accessibility label)
- tapOn:
          text: ".*Menu.*"

# Navigate to Redeem Points
- extendedWaitUntil:
          visible:
                  text: ".*Redeem Points.*"
          timeout: 5000
- tapOn:
          text: ".*Redeem Points.*"

# Wait for Screen and generic tabs
- extendedWaitUntil:
          visible: "Cashout|Donate|Gift Cards"
          timeout: 20000

# Cashout should be visible, tap it (tab)
- tapOn:
          text: "Cashout"

# Wait for the text in the active tab explaining Venmo
- extendedWaitUntil:
          visible: ".*Convert your points directly to USD.*"
          timeout: 5000

# Tap the Cashout button to open the sheet (using default 500 points)

# Tap the Cashout button to open the sheet
- scroll
- tapOn:
          id: "cashout-submit-button"

# Wait for Sheet to open and Input to appear
- extendedWaitUntil:
          visible: ".*Where should we send your money?.*|.*Enter Amount.*"
          timeout: 10000

# Fill out PayPal / Venmo Email
- tapOn: ".*Venmo #.*"
- inputText: "+15554443333"

# Hide Keyboard to see confirm button
- tapOn: ".*Where should we send your money?.*"

# Click Confirm
- tapOn: "Confirm Cashout"

# Wait for success
- extendedWaitUntil:
          visible: ".*Funds Sent!.*|.*Done.*"
          timeout: 15000

# Back to Feed if we succeeded
- tapOn:
          text: "Done"

# Cashout Flow — Maestro E2E test
# Verifies: User can navigate to Redeem Points, switch to Cashout tab, and submit a cashout
# Requires: User must be logged in and have at least 1 point

appId: dev.casagrown.community

---

# Login first
- runFlow: ../utils/login.yaml

# Wait for feed to load
- extendedWaitUntil:
          visible: "Tomatoes|Feed"
          timeout: 15000

# Open Menu via bottom tab (regex for iOS accessibility label)
- tapOn:
          text: ".*Menu.*"

# Navigate to Redeem Points
- extendedWaitUntil:
          visible:
                  text: ".*Redeem Points.*"
          timeout: 5000
- tapOn:
          text: ".*Redeem Points.*"

# Wait for Screen and generic tabs
- extendedWaitUntil:
          visible: "Cashout|Donate|Gift Cards"
          timeout: 20000

# Cashout button is in row 2, left column of the tab grid
# Tamagui Button doesn't reliably respond to testID/text taps via Maestro
# Use coordinate tap targeting the center of the Cashout button
- tapOn:
          point: "25%,30%"

# Wait for the text in the active tab explaining Venmo
- extendedWaitUntil:
          visible: ".*Convert your points directly to USD.*"
          timeout: 15000

# Tap the Cashout submit button (index:1 because index:0 is the tab label)
- tapOn:
          text: "Cashout"
          index: 1

# Wait for Sheet to open (keyboard may auto-focus the input field)
- extendedWaitUntil:
          visible: ".*Cash Out via PayPal.*|.*Where should we send your money?.*|.*Enter Amount.*"
          timeout: 10000

# Fill out PayPal / Venmo number
# The keyboard may be covering the Venmo input — scroll to find it if needed
- scrollUntilVisible:
          element:
                  text: ".*Venmo #.*"
          direction: DOWN
          timeout: 10000
- tapOn: ".*Venmo #.*"
- inputText: "+15554443333"

# Dismiss keyboard after typing (back key closes keyboard on Android)
- pressKey: back

# Click Confirm
- tapOn: "Confirm Cashout"

# Wait for success
- extendedWaitUntil:
          visible: ".*Funds Sent!.*|.*Done.*"
          timeout: 15000

# Back to Feed if we succeeded
- tapOn:
          text: "Done"

# Delegation Flow — Maestro E2E test
# Tests navigating to delegate sales via the Menu tab.
# Uses scrollUntilVisible for smaller Android screens.

appId: dev.casagrown.community

---

# Login first
- runFlow: ../utils/login.yaml

# Wait for feed to load
- extendedWaitUntil:
          visible: "Create Post"
          timeout: 15000
- scrollUntilVisible:
          element: "Tomatoes"
          direction: DOWN
          timeout: 15000

# Open Menu via bottom tab (regex for iOS accessibility label)
- tapOn:
          text: ".*Menu.*"

# Scroll to find Delegate Sales (may be below fold on Android)
- scrollUntilVisible:
          element:
                  text: ".*Delegate Sales.*"
          direction: DOWN
          timeout: 10000

# Tap "Delegate Sales"
- tapOn:
          text: ".*Delegate Sales.*"

# Wait for delegate screen to load
- extendedWaitUntil:
          visible:
                  text: ".*Delegate.*"
          timeout: 10000

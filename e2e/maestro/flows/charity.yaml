appId: dev.casagrown.community
---
# Login first
- runFlow: ../utils/login.yaml

# Wait for feed to load
- extendedWaitUntil:
      visible: "Tomatoes|Feed"
      timeout: 15000

# Open Menu via bottom tab
- tapOn:
      text: ".*Menu.*"

# Navigate to Redeem Points
- extendedWaitUntil:
      visible: ".*Redeem Points.*"
      timeout: 5000
- tapOn: ".*Redeem Points.*"

# Wait for Screen and generic tabs
- extendedWaitUntil:
      visible: "Cashout|Donate|Gift Cards"
      timeout: 20000

# Tap the Donate tab
- tapOn: "Donate"

# Wait for the charity list to load
- extendedWaitUntil:
      visible: ".*Donate.*"
      timeout: 10000

# Tap the first available Donate button
- tapOn:
      id: "donate-button-0"

# Wait for confirm sheet/modal
- extendedWaitUntil:
      visible: ".*Donation Amount.*"
      timeout: 10000

# Tap confirm checkout from the bottom sheet
- tapOn:
      id: "donation-sheet-confirm"

# Wait for Success (Toast or screen)
- extendedWaitUntil:
      visible: ".*Success.*|.*Thank you.*|.*Done.*"
      timeout: 15000

# Login Flow — Maestro E2E test for the login screen UI.
# Tests login UI elements when the app starts from a logged-out state.
# If the user is already logged in, the flow still passes (verifies feed).
#
# NOTE: After social logins were removed, the login screen shows the email
# input and "Send Verification Code" button directly (no "Continue with Email").

appId: dev.casagrown.community

---

# Launch without clearing state (preserves Expo dev server URL)
- launchApp:
          clearState: false

# Wait for the app to fully load
- extendedWaitUntil:
          visible:
                  text: ".*(?:Create Post|Join the Movement|Welcome to CasaGrown|Get You Set Up|Send Verification Code).*"
          timeout: 45000

# If already logged in, just verify feed and skip the rest
- runFlow:
          when:
                  visible: "Create Post"
          commands:
                  - assertVisible: "Create Post"

# ----- Login UI Tests (only run when NOT logged in) -----

# If on landing page, verify it and navigate to login
- runFlow:
          when:
                  visible: "Join the Movement!"
          commands:
                  - assertVisible: "Join the Movement!"
                  - tapOn: "Join the Movement!"
                  - extendedWaitUntil:
                            visible: "Welcome to CasaGrown"
                            timeout: 15000

# If on login page, verify all UI elements
- runFlow:
          when:
                  visible: "Welcome to CasaGrown"
          commands:
                  # Verify email input is directly visible (no social login step)
                  - assertVisible:
                            id: "email_input"

                  # Verify Send Verification Code button
                  - assertVisible: "Send Verification Code"

                  # Verify footer
                  - assertVisible:
                            text: ".*Terms of Service.*Privacy Policy.*"

                  # Test email input flow
                  - longPressOn:
                            id: "email_input"
                  - eraseText: 50
                  - inputText: "seller@test.local"
                  # Submit via keyboard Enter key (button hidden by keyboard)
                  - pressKey: Enter
                  - extendedWaitUntil:
                            visible: "Verification Code"
                            timeout: 15000
                  - assertVisible: "seller@test.local"
                  - assertVisible: "Verify & Continue"

# Hamburger Menu Flow — Maestro E2E test
# Tests the native Menu screen items and navigation.
# Validates Profile link goes to Profile screen (not My Posts).

appId: dev.casagrown.community

---

# Login first
- runFlow: ../utils/login.yaml

# Wait for feed to load
- extendedWaitUntil:
          visible: "Tomatoes"
          timeout: 15000

# Open Menu via bottom tab
- tapOn:
          text: ".*Menu.*"

# ── Verify menu items are visible ──
- extendedWaitUntil:
          visible:
                  text: ".*Profile.*Settings.*"
          timeout: 5000
- assertVisible:
          text: ".*Redeem Points.*"
- assertVisible:
          text: ".*Buy Points.*"
- assertVisible:
          text: ".*Transaction History.*"

# ── Verify Transfer Points is NOT visible ──
- assertNotVisible:
          text: ".*Transfer Points.*"

# ── Navigate to Profile (critical regression test) ──
- tapOn:
          text: ".*Profile.*Settings.*"

# Verify we arrive at Profile screen (not My Posts)
- extendedWaitUntil:
          visible:
                  text: ".*Profile.*"
          timeout: 10000

# Verify profile elements visible
- assertVisible:
          id: "profile-name"
- assertVisible:
          text: ".*seller@test.local.*"

# Go back to menu
- tapOn: "Back"
- extendedWaitUntil:
          visible:
                  text: ".*Menu.*"
          timeout: 5000

# Open menu again
- tapOn:
          text: ".*Menu.*"

# ── Scroll to more items ──
- scrollUntilVisible:
          element: "Invite Friends"
          direction: DOWN
          timeout: 5000
- assertVisible:
          text: ".*Invite Friends.*"

# Scroll to Sign Out
- scrollUntilVisible:
          element: "Sign Out"
          direction: DOWN
          timeout: 5000
- assertVisible: "Sign Out"

# ── Navigate to Buy Points ──
- scrollUntilVisible:
          element:
                  text: ".*Buy Points.*"
          direction: UP
          timeout: 5000
- tapOn:
          text: ".*Buy Points.*"

# Verify we navigated to buy points
- extendedWaitUntil:
          visible:
                  text: ".*Points.*"
          timeout: 10000

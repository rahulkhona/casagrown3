# Hamburger Menu Flow — Maestro E2E test
# Tests the native Menu screen items and navigation.
# Validates Profile link goes to Profile screen.

appId: dev.casagrown.community

---

# Login first
- runFlow: ../utils/login.yaml

# Wait for feed to load
- extendedWaitUntil:
          visible: "Create Post"
          timeout: 15000
- scrollUntilVisible:
          element: "Tomatoes"
          direction: DOWN
          timeout: 15000

# Open Menu via bottom tab
- tapOn:
          text: ".*Menu.*"

# ── Verify menu items are visible ──
- extendedWaitUntil:
          visible:
                  text: ".*Profile.*Settings.*"
          timeout: 5000
- assertVisible:
          text: ".*Redeem Points.*"
- assertVisible:
          text: ".*Buy Points.*"
- assertVisible:
          text: ".*Transaction History.*"
- assertVisible:
          text: ".*Refund Points.*"

# ── Verify Transfer Points is NOT visible ──
- assertNotVisible:
          text: ".*Transfer Points.*"

# ── Navigate to Profile (critical regression test) ──
- tapOn:
          text: ".*Profile.*Settings.*"

# Verify we arrive at Profile screen
- extendedWaitUntil:
          visible:
                  text: ".*Profile.*"
          timeout: 10000

# The profile screen may show a CommunityMap render error.
# Dismiss it if present, then verify profile elements.
- runFlow:
          when:
                  visible: "Dismiss"
          commands:
                  - tapOn: "Dismiss"

# Verify profile elements visible (after dismissing any error)
- runFlow:
          when:
                  visible:
                          id: "profile-name"
          commands:
                  - assertVisible:
                            id: "profile-name"
                  - assertVisible:
                            text: ".*seller@test.local.*"

# After profile visit, relaunch the app to clear any error state.
# (CommunityMap error can cover the entire screen including bottom tabs.)
- stopApp
- launchApp:
          clearState: false
          clearKeychain: false
          stopApp: false

# Wait for app to load back to the feed state
- extendedWaitUntil:
          visible:
                  text: ".*(?:Create Post|Tomatoes|Feed|Menu).*"
          timeout: 15000

# Open menu tab again
- tapOn:
          text: ".*Menu.*"

# ── Scroll to more items ──
- extendedWaitUntil:
          visible:
                  text: ".*Profile.*Settings.*"
          timeout: 5000

- scrollUntilVisible:
          element: "Invite Friends"
          direction: DOWN
          timeout: 5000
- assertVisible:
          text: ".*Invite Friends.*"

# Scroll to Sign Out
- scrollUntilVisible:
          element: "Sign Out"
          direction: DOWN
          timeout: 5000
- assertVisible: "Sign Out"

# ── Navigate to Buy Points ──
- scrollUntilVisible:
          element:
                  text: ".*Buy Points.*"
          direction: UP
          timeout: 5000
- tapOn:
          text: ".*Buy Points.*"

# Verify we navigated to buy points
- extendedWaitUntil:
          visible:
                  text: ".*Points.*"
          timeout: 10000

# Offers Screen — Maestro E2E test (Seller perspective)
# Tests offer screen visibility and tab/filter structure.
# Tab labels on iOS = "Offers, tab, 4 of 5" — use regex.
#
# Logged in as Test Seller (seller@test.local)

appId: dev.casagrown.community

---

# Login first
- runFlow: ../utils/login.yaml

# Wait for feed to load
- extendedWaitUntil:
      visible: "Create Post"
      timeout: 15000
- scrollUntilVisible:
      element: "Tomatoes"
      direction: DOWN
      timeout: 15000

# Navigate to Offers via bottom tab bar (regex for iOS accessibility label)
- tapOn:
      text: ".*Offers.*"

# Wait for Offers screen to load
- extendedWaitUntil:
      visible: "Open"
      timeout: 10000

# ── Verify tabs and filters are present ──
- assertVisible: "Open"
- assertVisible: "Past"
- assertVisible: "All"
- assertVisible: "Buying"
- assertVisible: "Selling"

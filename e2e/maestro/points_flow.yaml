# Points Flow — Maestro E2E test
# Tests points visibility and buy points navigation.
# Tab labels need regex: ".*Menu.*" etc.

appId: dev.casagrown.community

---

- launchApp:
          clearState: false

- runFlow: utils/login.yaml

# Wait for feed
- extendedWaitUntil:
          visible: "Tomatoes"
          timeout: 15000

# Points should be visible in header (e.g. "550 pts")
- assertVisible:
          text: ".*pts.*"

# Open Menu via bottom tab to navigate to Buy Points
- tapOn:
          text: ".*Menu.*"

# Open the Buy Points screen
- extendedWaitUntil:
          visible: "Buy Points"
          timeout: 5000
- tapOn: "Buy Points"
- extendedWaitUntil:
          visible: "Add Points to Your Loop"
          timeout: 10000

# Verify packages exist
- assertVisible: "1000 Points"
- assertVisible: "2500 Points"

# Select a package
- tapOn: "1000 Points"

# Verify order summary
- assertVisible: "Order Summary"
- assertVisible: "$10.00"

# Tap Purchase
- tapOn: "Purchase"

# Note: In Maestro, interacting with system-level Apple Pay prompts is out of bound and flaky.
# We stop the flow logically before fully completing an external intent.
- assertVisible:
          text: ".*Processing.*"

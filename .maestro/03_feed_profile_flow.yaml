appId: dev.casagrown.community
---
# 03 — Feed & Menu Tab Flow
# Verifies: Feed screen → all 5 bottom tabs → Menu screen items → Back to Feed
# Requires: User must be logged in
- launchApp

- extendedWaitUntil:
          visible: "Continue|.*Join the Movement.*|.*Feed.*|.*Search.*|.*pts.*"
          timeout: 30000

# Dismiss Expo dev menu if showing
- runFlow:
          when:
                  visible: "Continue"
          commands:
                  - tapOn: "Continue"
- runFlow:
          when:
                  visible: ".*Connected to.*"
          commands:
                  - pressKey: back

- extendedWaitUntil:
          visible: ".*Join the Movement.*|.*Feed.*|.*Search.*|.*pts.*"
          timeout: 30000

# Skip if not logged in
- runFlow:
          when:
                  visible: ".*Join the Movement.*"
          commands:
                  - tapOn: ".*Join the Movement.*"
                  - assertVisible: ".*Welcome to CasaGrown.*"

# ============ FEED SCREEN (logged in only) ============
- runFlow:
          when:
                  visible: ".*Feed.*"
          commands:
                  - assertVisible: ".*Search.*"
                  - assertVisible: ".*Feed.*"
                  - assertVisible: ".*Chats.*"
                  - assertVisible: ".*Orders.*"
                  - assertVisible: ".*Offers.*"
                  - assertVisible: ".*Menu.*"
                  - assertVisible: ".*pts.*"

                  # ============ MENU TAB ============
                  - tapOn: ".*Menu.*"
                  - extendedWaitUntil:
                            visible: ".*Profile.*Settings.*|.*Delegate Sales.*"
                            timeout: 10000
                  - assertVisible: ".*Profile.*Settings.*"
                  - assertVisible: ".*Redeem Points.*"
                  - assertVisible: ".*Transaction History.*"
                  - assertVisible: ".*Buy Points.*"
                  - assertVisible: ".*Delegate Sales.*"
                  - assertVisible: ".*Accept Delegation.*"
                  - assertVisible: ".*Invite Friends.*"
                  - assertVisible: ".*My Posts.*"
                  - assertVisible: ".*Sign Out.*"

                  # ============ BACK TO FEED ============
                  - tapOn: ".*Feed.*"
                  - extendedWaitUntil:
                            visible: ".*Search.*|.*Feed.*"
                            timeout: 10000

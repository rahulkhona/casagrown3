appId: dev.casagrown.community
---
# 07 — Delegation Test (Menu → Delegate Sales)
# Verifies: Menu tab → Delegate Sales → delegate screen elements
# Requires: User must be logged in
- launchApp

- extendedWaitUntil:
      visible: "Continue|.*Feed.*|.*Search.*|.*pts.*|.*Join the Movement.*"
      timeout: 30000

# Dismiss Expo dev menu if showing
- runFlow:
      when:
          visible: "Continue"
      commands:
          - tapOn: "Continue"
- runFlow:
      when:
          visible: ".*Connected to.*"
      commands:
          - pressKey: back

- extendedWaitUntil:
      visible: ".*Feed.*|.*Search.*|.*pts.*|.*Join the Movement.*"
      timeout: 30000

- runFlow:
      when:
          visible: ".*Feed.*"
      commands:
          # ============ NAVIGATE TO DELEGATE SALES ============
          - tapOn: ".*Menu.*"
          - extendedWaitUntil:
                visible: ".*Delegate Sales.*"
                timeout: 10000
          - tapOn: ".*Delegate Sales.*"
          - extendedWaitUntil:
                visible: ".*Delegate.*|.*Add New Delegate.*"
                timeout: 15000

          # Verify Delegate screen
          - assertVisible: ".*Delegate Sales.*"

          # ============ BACK TO MENU ============
          - pressKey: back
          - tapOn: ".*Feed.*"
          - extendedWaitUntil:
                visible: ".*Search.*|.*Feed.*"
                timeout: 10000

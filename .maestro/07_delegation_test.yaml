appId: dev.casagrown.community
---
- launchApp
- extendedWaitUntil:
    visible: ".*developer menu.*|.*CasaGrown.*|.*Join the Movement.*"
    timeout: 60000

# Dismiss developer menu if showing
- runFlow:
    when:
      visible: ".*developer menu.*"
    commands:
      - tapOn: "Continue"

# Handle dev tools panel (Android)
- runFlow:
    when:
      visible: "Go home"
    commands:
      - tapOn: "Go home"

# Handle Reload button
- runFlow:
    when:
      visible: "Reload"
    commands:
      - tapOn: "Reload"

- extendedWaitUntil:
    visible: ".*Join the Movement.*"
    timeout: 60000

# Navigate to Login
- tapOn: ".*Join the Movement.*"

- extendedWaitUntil:
    visible: ".*Welcome to CasaGrown.*"
    timeout: 15000

# Tap Continue with Email
- tapOn: "Continue with Email"

- extendedWaitUntil:
    visible: ".*Email Address.*"
    timeout: 10000

- tapOn:
    id: "email_input"
- eraseText: 50
- inputText: "buyer@test.local"
- pressKey: enter

# Tap Send Verification Code
- tapOn: ".*Send Verification Code.*"

# Wait for OTP screen
- extendedWaitUntil:
    visible: ".*verification code.*|.*Verification Code.*"
    timeout: 60000

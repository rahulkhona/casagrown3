appId: dev.casagrown.community
---
# 05 — Offers & Tab Switching Flow
# Verifies: Offers tab → rapid tab cycling
# Requires: User must be logged in
- launchApp

- extendedWaitUntil:
          visible: "Continue|.*Feed.*|.*Search.*|.*pts.*|.*Join the Movement.*"
          timeout: 30000

# Dismiss Expo dev menu if showing
- runFlow:
          when:
                  visible: "Continue"
          commands:
                  - tapOn: "Continue"
- runFlow:
          when:
                  visible: ".*Connected to.*"
          commands:
                  - pressKey: back

- extendedWaitUntil:
          visible: ".*Feed.*|.*Search.*|.*pts.*|.*Join the Movement.*"
          timeout: 30000

- runFlow:
          when:
                  visible: ".*Feed.*"
          commands:
                  - tapOn: ".*Offers.*"
                  - extendedWaitUntil:
                            visible: ".*Offers.*|.*No offers.*"
                            timeout: 15000
                  - assertVisible: ".*pts.*"

                  # Rapid tab switching
                  - tapOn: ".*Feed.*"
                  - extendedWaitUntil:
                            visible: ".*Search.*|.*Feed.*"
                            timeout: 5000
                  - tapOn: ".*Chats.*"
                  - extendedWaitUntil:
                            visible: ".*Chats.*|.*No conversations.*"
                            timeout: 5000
                  - tapOn: ".*Orders.*"
                  - extendedWaitUntil:
                            visible: ".*Orders.*|.*No orders.*"
                            timeout: 5000
                  - tapOn: ".*Offers.*"
                  - extendedWaitUntil:
                            visible: ".*Offers.*|.*No offers.*"
                            timeout: 5000
                  - tapOn: ".*Menu.*"
                  - extendedWaitUntil:
                            visible: ".*Profile.*Settings.*|.*Sign Out.*"
                            timeout: 5000
                  - tapOn: ".*Feed.*"
                  - extendedWaitUntil:
                            visible: ".*Search.*|.*Feed.*"
                            timeout: 5000

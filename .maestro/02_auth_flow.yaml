appId: dev.casagrown.community
---
# 02 — Auth Flow (Email OTP)
# Verifies: Home → Login → Email input → Send Verification Code → OTP screen
# NOTE: Only runs if user is logged out. If logged in, signs out first.
- launchApp

- extendedWaitUntil:
          visible: "Continue|.*Join the Movement.*|.*Feed.*|.*Search.*|.*pts.*"
          timeout: 30000

# Dismiss Expo dev menu if showing
- runFlow:
          when:
                  visible: "Continue"
          commands:
                  - tapOn: "Continue"
- runFlow:
          when:
                  visible: ".*Connected to.*"
          commands:
                  - pressKey: back

- extendedWaitUntil:
          visible: ".*Join the Movement.*|.*Feed.*|.*Search.*|.*pts.*"
          timeout: 30000

# If logged in, sign out first via Menu tab
- runFlow:
          when:
                  visible: ".*Feed.*"
          commands:
                  - tapOn: ".*Menu.*"
                  - extendedWaitUntil:
                            visible: ".*Sign Out.*"
                            timeout: 10000
                  - tapOn: ".*Sign Out.*"
                  - extendedWaitUntil:
                            visible: ".*Sign Out.*"
                            timeout: 5000
                  - tapOn: ".*Sign Out.*"
                  - extendedWaitUntil:
                            visible: ".*Join the Movement.*"
                            timeout: 15000

# Now on Home Screen — navigate to Login
- tapOn: ".*Join the Movement.*"

# Verify Login Screen loaded
- assertVisible: ".*Welcome to CasaGrown.*"
- assertVisible: ".*Sign in to start buying and selling.*"
- assertVisible: ".*Continue with Google.*"

# Test Email OTP Flow
- tapOn: "Continue with Email"
- extendedWaitUntil:
          visible: ".*Email Address.*"
          timeout: 10000
- tapOn:
          id: "email_input"
- eraseText: 50
- inputText: "buyer@test.local"
- pressKey: enter
- tapOn: ".*Send Verification Code.*"

# Verify OTP screen is displayed
- extendedWaitUntil:
          visible: ".*verification code.*|.*Verification Code.*"
          timeout: 60000
- assertVisible: ".*buyer@test.local.*"
- assertVisible: ".*Verification Code.*"
- assertVisible: ".*Verify.*Continue.*"
- assertVisible: ".*Resend code.*"

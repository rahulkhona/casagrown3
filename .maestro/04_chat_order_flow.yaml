appId: dev.casagrown.community
---
# 04 — Chat & Orders Tab Flow
# Verifies: Chats tab → Orders tab → MobileTabHeader on each
# Requires: User must be logged in
- launchApp

- extendedWaitUntil:
          visible: "Continue|.*Feed.*|.*Search.*|.*pts.*|.*Join the Movement.*"
          timeout: 30000

# Dismiss Expo dev menu if showing
- runFlow:
          when:
                  visible: "Continue"
          commands:
                  - tapOn: "Continue"
- runFlow:
          when:
                  visible: ".*Connected to.*"
          commands:
                  - pressKey: back

- extendedWaitUntil:
          visible: ".*Feed.*|.*Search.*|.*pts.*|.*Join the Movement.*"
          timeout: 30000

# Only run if logged in
- runFlow:
          when:
                  visible: ".*Feed.*"
          commands:
                  - tapOn: ".*Chats.*"
                  - extendedWaitUntil:
                            visible: ".*Chats.*|.*No conversations.*"
                            timeout: 15000
                  - assertVisible: ".*pts.*"

                  - tapOn: ".*Orders.*"
                  - extendedWaitUntil:
                            visible: ".*Orders.*|.*No orders.*"
                            timeout: 15000
                  - assertVisible: ".*pts.*"

                  - tapOn: ".*Feed.*"
                  - extendedWaitUntil:
                            visible: ".*Feed.*|.*Search.*"
                            timeout: 10000
